<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Messaging App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .chat-container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 360px;
            background: #fff;
            border-right: 1px solid #e5e5ea;
            display: flex;
            flex-direction: column;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f0f0;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-group {
            display: flex;
            margin-bottom: 4px;
        }
        .message-group.own {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 60%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .message-bubble.own {
            background: #00a884;
            color: white;
        }
        .message-bubble.other {
            background: #e5e5ea;
            color: #000;
        }
        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .input-area {
            padding: 12px;
            background: #fff;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e5e5ea;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
        }
        .chat-list-item {
            padding: 8px 8px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .chat-list-item:hover {
            background: #f5f5f5;
        }
        .chat-list-item.active {
            background: #e5e5ea;
        }
        .online-indicator {
            width: 10px;
            height: 10px;
            background: #31a24c;
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
        }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00a884 0%, #075e54 100%);
        }
        .auth-form {
            background: white;
            padding: 32px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-form h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #00a884;
            text-align: center;
        }
        .auth-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .auth-form button {
            width: 100%;
            padding: 12px;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .auth-form button:hover {
            background: #078d72;
        }
        .auth-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
        .auth-link a {
            color: #00a884;
            cursor: pointer;
            text-decoration: none;
        }
        .header {
            padding: 16px;
            background: #fff;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h2 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
            color: #00a884;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }
            .chat-area {
                display: none;
            }
            .chat-area.active {
                display: flex;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 10;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Auth pages will be rendered here -->
    </div>

    <script src="js/api.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
